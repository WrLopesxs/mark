<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcação de Defeito</title>

  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./marcacao.css">
</head>

<body>
  <main class="page-shell">
    
    <section class="hero-card">
      <div class="hero-copy">
        <p class="eyebrow">Toyota QC</p>
        <h1>Marcação de Defeito</h1>
      </div>

      <div class="status-panel">
        <p class="status-label">Status</p>
        <p class="status-value" id="statusText">Aguardando parâmetros do registro.</p>
      </div>
    </section>

    <section class="workspace-grid">
      
      <aside class="side-card">

        <div class="card-head">
          <h2>Registro</h2>
          <button class="ghost-btn" id="reloadButton" type="button">Recarregar</button>
        </div>

        <div class="field-list">
          <label class="field">
            <span>ID</span>
            <input id="recordId" type="text" readonly>
          </label>

          <label class="field">
            <span>Part Number</span>
            <input id="partNumber" type="text" readonly>
          </label>

          <label class="field">
            <span>Defeito</span>
            <input id="defectType" type="text" readonly>
          </label>

          <label class="field">
            <span>Linha</span>
            <input id="sheetRow" type="text" readonly>
          </label>

          <label class="field">
            <span>Usuário</span>
            <input id="userName" type="text" placeholder="Obrigatorio" required>
          </label>
        </div>

        <div class="action-stack">
          <button class="primary-btn" id="loadImageButton">Buscar imagem da peça</button>
          <button class="secondary-btn" id="saveButton">Salvar marcação</button>
          <button class="ghost-btn" id="clearButton">Limpar desenho</button>
        </div>

        <div class="tool-box">
          <div class="card-head">
            <h2>Ferramentas</h2>
          </div>

          <label class="field">
            <span>Cor</span>
            <input id="brushColor" type="color" value="#e11d48">
          </label>

          <label class="field">
            <span>Espessura</span>
            <input id="brushSize" type="range" min="2" max="24" value="8">
          </label>

          <p id="brushPreview">Espessura atual: 8 px</p>
        </div>

      </aside>

      <section class="canvas-card">
        <div class="card-head">
          <div>
            <h2>Canvas de marcação</h2>
            <p id="canvasSubtitle">Nenhuma imagem carregada.</p>
          </div>
          <span id="canvasMode">Pronto</span>
        </div>

        <div id="canvasStage" class="canvas-stage">
          <img id="baseImage">
          <canvas id="annotationCanvas"></canvas>
          <div id="canvasEmpty" class="canvas-empty">
            <p>A imagem da peça vai aparecer aqui.</p>
          </div>
        </div>
      </section>

    </section>
  </main>

  <!-- 🔥 CAMPOS OCULTOS (ESSENCIAL) -->
  <input id="apiUrl" type="hidden">
  <input id="manualImageUrl" type="hidden">

  <script src="./marcacao.js"></script>
</body>
</html>
